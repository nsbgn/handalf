<?xml version="1.0" encoding="UTF-8"?>
<svg width="784" height="254" version="1.1" viewBox="-1 -1 390 130" xmlns="http://www.w3.org/2000/svg">
<!--caps insert -->
<defs>
<style type="text/css"><![CDATA[
text {
  font-size: 8px;
  text-anchor: middle;
  font-family: monospace;
}
.big {
  font-size: 10px;
}
.mod {
  font-weight: bold;
}
.tap, .doubletap {
  font-size: 7px;
  transform: translate(13px, -12px);
  text-anchor: end;
  opacity: .6;
  font-style: italic;
}
.tap {
  text-decoration: underline;
}
.doubletap {
  text-decoration: double underline;
}
.shift {
  fill: #225500;
}
.altgr {
  fill: #004488;
}
.fn {
  fill: #801818;
}
.media {
  fill: #801880;
}
.dim,
#right .fn {
  opacity: .25;
}

.c0 { transform: translate(15px, 0); }
.c1 { transform: translate(47px, 0); }
.c2 { transform: translate(79px, 0); }
.c3 { transform: translate(111px, 0); }
.c4 { transform: translate(143px, 0); }
.c5 { transform: translate(175px, 0); }
.r0 { transform: translate(0, 18px); }
.r1 { transform: translate(0, 50px); }
.r2 { transform: translate(0, 82px); }
.r3 { transform: translate(0, 114px); }

g.kb > g > g > text:first-child {
  font-size: 8px;
}

g.kb > g > g > g:first-child:has(> :last-child:nth-child(3)) > text:nth-child(1) {
  font-size: 10px;
  transform: translate(-5px, 0px);
  text-anchor: end;
  opacity: 30%;
}
g.kb > g > g > g:first-child:has(> :last-child:nth-child(3)) > text:nth-child(2) {
  transform: translate(5px, 0px);
  text-anchor: start;
  font-size: 10px;
  opacity: 30%;
}
g.kb > g > g > g:first-child:has(> :last-child:nth-child(3)) > text:nth-child(3) {
  font-size: 13px;
  fill: #004488;
  transform: translate(0px, 1px);
  text-anchor: middle;
}
g.kb > g > g > text {
  font-size: 5px;
}
g.kb > g > g > text.fn {
  font-size: 6px;
  transform: translate(0, -11px);
  text-anchor: middle;
}
g.kb > g > g > text.media {
  font-size: 6px;
  transform: translate(0, 8px);
  text-anchor: middle;
}

]]></style>
  <g id="unit">
    <rect width="29" height="28" ry="5" x="0.5" y="1.5" fill="#454C54" stroke="#454C54" stroke-width="1px"/>
    <rect width="29" height="28" ry="5" x="0.5" fill="#E6EAEF" stroke="#454C54" stroke-width="1px"/>
  </g>
  <g id="6x1">
    <use href="#unit" x="0" y="0"/>
    <use href="#unit" x="32" y="0"/>
    <use href="#unit" x="64" y="0"/>
    <use href="#unit" x="96" y="0"/>
    <use href="#unit" x="128" y="0"/>
    <use href="#unit" x="160" y="0"/>
  </g>
  <g id="lhs">
