##############################################################################
# SETTINGS

[ids]
# Internal keyboard
0001:0001
# If you want to include other IDs, add an /etc/keyd/ids file
include ids

[global]
chord_timeout = 50
overload_tap_timeout = 300
oneshot_timeout = 400
disable_modifier_guard = 1

##############################################################################
# MAIN LAYER

[main]
capslock = backspace
leftmeta = layer(alt)
leftalt = timeout(overload(Fn, cancel), 150, layer(Fn))
rightalt = oneshot(Sym)
leftshift = oneshot(shift)
rightshift = backslash

# The `enter` key is far away on a laptop. To bring it in line with the
# ortholinear variant where enter is on the top right, we simply scoot the
# square brackets to the right. We don't need backslash as it is also on
# rightshift.
[ = enter
] = [
\ = ]

##############################################################################
# SYMBOL MODIFIERS

[shift:S]
# We add a keypress here to make it possible to do something with
# leftshift+rightalt, as though the Sym key was a real AltGr.
rightalt = oneshotm(Sym, S-rightalt)

# Double tapping leftshift will get you capslock
leftshift = timeout(overload(shift, capslock), 150, layer(shift))

# Rightshift should always emit backslash, not shifted into a pipe symbol.
rightshift = backslash

[Sym]
include handalf_sym

capslock = backspace

# We add the AltGr modifier here to make it possible to do something with
# leftshift+rightalt and leftalt+rightalt.
leftshift = layerm(shift, G-leftshift)
leftalt = timeout(overload(Fn, G-cancel), 150, layer(Fn))

# Double tapping rightalt will turn the Sym layer into a real AltGr modifier.
rightalt = oneshot(altgr)

##############################################################################
# OVERRIDE LAYERS
#
# While in the Fn layer:
#
# - The `a` key is a sticky `leftcontrol`, for a comfortable way to type
#   `ctrl+{a,x,c,v,s,f,r,...}` without a dedicated left thumb key.
# - `z` acts as a non-sticky `leftmeta`, for opening the global menu now that the
#   physical `leftmeta` is taken. `space` is `rightmeta` for an alternative
#   that may be more convenient when your spacebar is full-sized.
#
# This admittedly comes at some minor expense of beauty and simplicity, because
# it means that the keys in the Fn layer must be temporarily disabled. The
# following override layers are used to achieve this, as there is no
# oneshotswap or overloadswap (see <https://github.com/rvaiya/keyd/issues/673>)

[ControlOverride:C]
include handalf_workaround_ctrl

[MetaOverride:M]
include handalf_workaround_meta

##############################################################################
# ALT-TAB
#
# Pressing Tab in Fn emits Alt-Tab, but it also keeps the Alt modifier active
# until you let go of Fn or press another key in the layer. This keeps the
# window list open, mimicking the behaviour that occurs when window switching
# with Alt-Tab normally.

# To achieve this, in addition to emitting Alt-tab, we swap out the Fn layer
# for a special layer with the alt modifier attached, and swap it back to Fn
# when any other key is pressed:

[AltTabFn:A]
include handalf_alttab_fn

# We want Fn-Sym-tab to emit Alt-Shift-tab, so that we can reverse the window
# selection direction with AltGr/Sym (instead of being limited to the less
# conveniently placed left Shift or possibly absent right Shift). Ideally:
#
# - Turn AltTabFn+Sym into Fn+Sym as soon as we press a non-tab/non-thumb key.
# - Keep either part of that composite layer active only as long as the
# respective key is pressed.
#
# If we enter the AltTabFn layer *after* the Sym layer, we have little to worry
# about because AltTabFn will supersede Sym and the next press of tab will just
# fall through to the Sym layer (which sets it to S-tab) after stacking the
# attached Alt modifier on top.
#
# But this is not so in case that we have entered AltTabFn *first*. We can't
# use `swapm` in composite layers and we can't swap AltTabFn from any other
# layer. We settle for the situation that AltTabFn+Sym is the same as Fn+Sym.
# This means that we do not fully disable the Alt modifier when we press
# a non-tab/-thumb key. I might need to think about this more.

[AltTabFn+Sym]
include handalf_media

##############################################################################
# FN/MEDIA LAYERS

[Fn]
include handalf_fn

# Since we lose rightshift to backslash, there's still a way to get rightshift
# should it be needed for some reason.
leftshift = timeout(overload(shift, rightshift), 150, layer(shift))

[Fn+Sym]
include handalf_media
